{% extends "base_public.html" %}

{% block title %}Forgot Password - {{ business_name }}{% endblock %}

{% block content %}

<style>
/* =========================
   ROOT VARIABLES
========================= */
:root {
    --primary: #0C5B3F;
    --primary-light: #138A52;
    --primary-dark: #0a4d35;
    --accent: #138A52;
    --text: #1f2937;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --bg-light: #f9fafb;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
}

/* =========================
   RESET & BASE
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0C5B3F 0%, #138A52 55%, #1ca56a 100%);
    min-height: 100vh;
    padding: 1rem;
    position: relative;
}

/* Hide Navbar & Footer */
nav.navbar,
footer {
    display: none !important;
}

/* =========================
   PAGE CONTAINER
========================= */
.page-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* =========================
   CARD
========================= */
.forgot-card {
    width: 100%;
    max-width: 440px;
    background: white;
    border-radius: 28px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    overflow: hidden;
    animation: fadeUp 0.4s ease-out;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* =========================
   HEADER
========================= */
.forgot-header {
    text-align: center;
    padding: 2rem 2rem 1.5rem;
}

.forgot-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 1.25rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    box-shadow: 0 8px 20px rgba(12, 91, 63, 0.25);
}

.forgot-icon i {
    color: white;
    font-size: 2rem;
}

.forgot-header h1 {
    color: var(--primary);
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    letter-spacing: -0.3px;
}

.forgot-header p {
    color: var(--text-muted);
    font-size: 0.875rem;
    line-height: 1.5;
}

/* =========================
   BODY
========================= */
.forgot-body {
    padding: 0 2rem 2rem;
}

/* Alert User */
.alert-user {
    background: #eefbf3;
    border: 1px solid #d8f3e3;
    color: var(--primary);
    border-radius: 14px;
    padding: 0.875rem 1rem;
    margin-bottom: 1.5rem;
    text-align: center;
    font-weight: 500;
    font-size: 0.875rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

/* Form Groups */
.form-group {
    margin-bottom: 1.25rem;
}

.form-label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text);
    font-size: 0.8125rem;
    font-weight: 600;
    letter-spacing: 0.3px;
}

/* Input Group */
.input-group {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: white;
    transition: all 0.2s ease;
    position: relative;
}

.input-group:focus-within {
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(19, 138, 82, 0.08);
}

.input-group-text {
    border: none;
    background: transparent;
    padding: 0.875rem 0 0.875rem 1rem;
    display: flex;
    align-items: center;
    min-width: 48px;
}

.input-group-text i {
    color: var(--primary-light);
    font-size: 1.125rem;
}

.form-control {
    border: none !important;
    box-shadow: none !important;
    padding: 0.875rem 1rem 0.875rem 0;
    font-size: 0.9375rem;
    color: var(--text);
    background: transparent;
    width: 100%;
}

.form-control:focus {
    outline: none;
}

.form-control::placeholder {
    color: #9ca3af;
    font-size: 0.875rem;
}

/* Password Toggle */
.password-toggle {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #9ca3af;
    transition: color 0.2s ease;
    z-index: 10;
    padding: 0.25rem;
    display: flex;
    align-items: center;
}

.password-toggle:hover {
    color: var(--primary-light);
}

/* Divider */
.divider {
    display: flex;
    align-items: center;
    margin: 1.5rem 0;
}

.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
}

.divider span {
    padding: 0 0.75rem;
    color: #9ca3af;
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* Buttons */
.btn-send,
.btn-reset {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 0.875rem 1rem;
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

.btn-send {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    margin-bottom: 1rem;
}

.btn-reset {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
}

.btn-send:hover,
.btn-reset:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
}

.btn-send:active,
.btn-reset:active {
    transform: translateY(0);
}

.btn-send:disabled,
.btn-reset:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}

/* Resend OTP Button */
.resend-otp-btn {
    background: none;
    border: none;
    color: var(--primary-light);
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.5rem;
}

.resend-otp-btn:hover {
    color: var(--primary);
    gap: 0.5rem;
}

.resend-otp-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* Login Link */
.login-link {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
}

.login-link a {
    text-decoration: none;
    color: var(--primary-light);
    font-size: 0.875rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    transition: all 0.2s ease;
}

.login-link a:hover {
    color: var(--primary);
    gap: 0.5rem;
}

/* Text hint */
.text-hint {
    font-size: 0.6875rem;
    color: #888;
    margin-top: 0.5rem;
    display: block;
}

/* =========================
   TOAST NOTIFICATIONS
========================= */
.toast-notification {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    padding: 0.875rem 1.25rem;
    border-radius: 12px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    animation: slideInRight 0.3s ease;
    font-size: 0.875rem;
    font-weight: 500;
}

.toast-success {
    background: #10b981;
    color: white;
}

.toast-error {
    background: #ef4444;
    color: white;
}

.toast-info {
    background: #3b82f6;
    color: white;
}

@keyframes slideInRight {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes slideOutRight {
    from {
        transform: translateX(0);
        opacity: 1;
    }
    to {
        transform: translateX(100%);
        opacity: 0;
    }
}

/* Spinner */
.spinner-sm {
    width: 1rem;
    height: 1rem;
    border: 2px solid white;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

/* Hidden elements */
.hidden {
    display: none;
}

/* =========================
   MOBILE OPTIMIZATION
========================= */
@media (max-width: 640px) {
    body {
        padding: 0.75rem;
    }
    
    .forgot-card {
        max-width: 100%;
        border-radius: 24px;
    }
    
    .forgot-header {
        padding: 1.5rem 1.5rem 1rem;
    }
    
    .forgot-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 1rem;
    }
    
    .forgot-icon i {
        font-size: 1.5rem;
    }
    
    .forgot-header h1 {
        font-size: 1.5rem;
    }
    
    .forgot-header p {
        font-size: 0.8125rem;
    }
    
    .forgot-body {
        padding: 0 1.5rem 1.5rem;
    }
    
    .form-control {
        padding: 0.75rem 1rem 0.75rem 0;
        font-size: 1rem;
    }
    
    .input-group-text {
        min-width: 42px;
        padding: 0.75rem 0 0.75rem 0.75rem;
    }
    
    .input-group-text i {
        font-size: 1rem;
    }
    
    .btn-send,
    .btn-reset {
        padding: 0.75rem 1rem;
        font-size: 0.875rem;
    }
    
    .toast-notification {
        bottom: 0.75rem;
        right: 0.75rem;
        left: 0.75rem;
        padding: 0.75rem 1rem;
    }
}

.text-center {
    text-align: center;
}
</style>

<div class="page-wrapper">
    <div class="forgot-card">
        <!-- HEADER -->
        <div class="forgot-header">
            <div class="forgot-icon">
                <i class="bi bi-key-fill"></i>
            </div>
            <h1>Forgot Password?</h1>
            <p>Recover your account securely using OTP verification</p>
        </div>

        <!-- BODY -->
        <div class="forgot-body">
            <form id="forgotForm" method="POST">
                <input type="hidden" name="forgot_type" value="{{ user_type }}">
                <input type="hidden" id="actionInput" name="action" value="">
                <input type="hidden" id="usernameHidden" name="username" value="">

                <!-- STEP 1: Username Input (shown initially) -->
                <div id="stepUsername" class="step">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control" id="username" 
                                   placeholder="Enter your username" required autofocus
                                   value="{{ username if username else '' }}">
                        </div>
                    </div>

                    <button type="button" id="sendOtpBtn" class="btn-send">
                        <i class="bi bi-envelope"></i>
                        Send OTP
                    </button>
                </div>

                <!-- STEP 2: OTP + New Password (hidden initially) -->
                <div id="stepReset" class="step hidden">
                    <div class="alert-user" id="usernameDisplay"></div>

                    <div class="divider">
                        <span>Verify OTP</span>
                    </div>

                    <!-- OTP Input -->
                    <div class="form-group">
                        <label class="form-label">OTP Code</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-shield-lock"></i>
                            </span>
                            <input type="text" class="form-control" id="otp" 
                                   placeholder="Enter 6-digit OTP" required maxlength="6">
                        </div>
                    </div>

                    <!-- Resend OTP Button -->
                    <div class="text-center">
                        <button type="button" id="resendOtpBtn" class="resend-otp-btn">
                            <i class="bi bi-arrow-repeat"></i>
                            Didn't receive OTP? Resend
                        </button>
                    </div>

                    <div class="divider">
                        <span>Set New Password</span>
                    </div>

                    <!-- New Password -->
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="new_password" 
                                   placeholder="Enter new password" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('new_password', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <span class="text-hint">Password must be at least 6 characters</span>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-check-circle"></i>
                            </span>
                            <input type="password" class="form-control" id="confirm_password" 
                                   placeholder="Confirm new password" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('confirm_password', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Reset Password Button -->
                    <button type="button" id="resetBtn" class="btn-reset">
                        <i class="bi bi-check-circle"></i>
                        Reset Password
                    </button>
                </div>
            </form>

            <!-- Login Link -->
            <div class="login-link">
                <a href="{{ url_for('auth.login', type=user_type) }}">
                    <i class="bi bi-arrow-left"></i>
                    Back to Login
                </a>
            </div>
        </div>
    </div>
</div>

<script>
// Current username for OTP flow
let currentUsername = '';

// Password visibility toggle
function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
}

// Toast notification
function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `toast-notification toast-${type}`;
    toast.innerHTML = `<i class="bi ${type === 'success' ? 'bi-check-circle-fill' : type === 'error' ? 'bi-exclamation-triangle-fill' : 'bi-info-circle-fill'}"></i><span>${message}</span>`;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.animation = 'slideOutRight 0.3s ease';
        setTimeout(() => toast.remove(), 300);
    }, 4000);
}

// Update button state with spinner
function setButtonLoading(button, loading) {
    if (loading) {
        if (!button._originalHtml) {
            button._originalHtml = button.innerHTML;
        }
        button.disabled = true;
        button.innerHTML = '<span class="spinner-sm"></span> Please wait...';
    } else {
        button.disabled = false;
        if (button._originalHtml) {
            button.innerHTML = button._originalHtml;
        }
    }
}

// Send OTP
async function sendOTP(username, isResend = false) {
    const formData = new URLSearchParams();
    formData.append('action', 'send_otp');
    formData.append('username', username);
    formData.append('forgot_type', '{{ user_type }}');
    
    const sendBtn = document.getElementById('sendOtpBtn');
    setButtonLoading(sendBtn, true);
    
    try {
        const response = await fetch(window.location.href, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
            showToast(data.message, 'success');
            currentUsername = username;
            
            // Show step 2 (OTP + password fields)
            document.getElementById('stepUsername').classList.add('hidden');
            document.getElementById('stepReset').classList.remove('hidden');
            document.getElementById('usernameDisplay').innerHTML = `<i class="bi bi-person-circle"></i> ${escapeHtml(username)}`;
            document.getElementById('usernameHidden').value = username;
            
            // Focus on OTP field
            document.getElementById('otp').focus();
        } else {
            showToast(data.error, 'error');
        }
    } catch (error) {
        console.error('Error:', error);
        showToast('Network error. Please check your connection.', 'error');
    } finally {
        setButtonLoading(sendBtn, false);
    }
}

// Reset password
async function resetPassword() {
    const otp = document.getElementById('otp').value.trim();
    const newPassword = document.getElementById('new_password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    
    // Validation
    if (!otp || otp.length !== 6) {
        showToast('Please enter a valid 6-digit OTP', 'error');
        return;
    }
    
    if (newPassword !== confirmPassword) {
        showToast('Passwords do not match!', 'error');
        return;
    }
    
    if (newPassword.length < 6) {
        showToast('Password must be at least 6 characters long!', 'error');
        return;
    }
    
    const formData = new URLSearchParams();
    formData.append('action', 'reset_password');
    formData.append('username', currentUsername);
    formData.append('otp', otp);
    formData.append('new_password', newPassword);
    formData.append('confirm_password', confirmPassword);
    formData.append('forgot_type', '{{ user_type }}');
    
    const resetBtn = document.getElementById('resetBtn');
    setButtonLoading(resetBtn, true);
    
    try {
        const response = await fetch(window.location.href, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
            showToast(data.message, 'success');
            setTimeout(() => {
                window.location.href = data.redirect_to;
            }, 2000);
        } else {
            showToast(data.error, 'error');
        }
    } catch (error) {
        console.error('Error:', error);
        showToast('Network error. Please check your connection.', 'error');
    } finally {
        setButtonLoading(resetBtn, false);
    }
}

// Resend OTP
async function resendOTP() {
    if (!currentUsername) return;
    
    const resendBtn = document.getElementById('resendOtpBtn');
    setButtonLoading(resendBtn, true);
    
    const formData = new URLSearchParams();
    formData.append('action', 'send_otp');
    formData.append('username', currentUsername);
    formData.append('forgot_type', '{{ user_type }}');
    
    try {
        const response = await fetch(window.location.href, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
            showToast('OTP resent successfully!', 'success');
            document.getElementById('otp').value = '';
            document.getElementById('otp').focus();
        } else {
            showToast(data.error, 'error');
        }
    } catch (error) {
        console.error('Error:', error);
        showToast('Network error. Please try again.', 'error');
    } finally {
        setButtonLoading(resendBtn, false);
    }
}

// Escape HTML to prevent XSS
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Check if username is already provided (from backend redirect)
document.addEventListener('DOMContentLoaded', function() {
    const preFilledUsername = document.getElementById('username').value;
    if (preFilledUsername && preFilledUsername.trim()) {
        // Auto-send OTP if username is pre-filled
        setTimeout(() => {
            document.getElementById('sendOtpBtn').click();
        }, 500);
    }
});

// Event listeners
document.getElementById('sendOtpBtn').addEventListener('click', () => {
    const username = document.getElementById('username').value.trim();
    if (!username) {
        showToast('Please enter your username', 'error');
        return;
    }
    sendOTP(username, false);
});

document.getElementById('resetBtn').addEventListener('click', resetPassword);
document.getElementById('resendOtpBtn').addEventListener('click', resendOTP);

// Enter key support
document.getElementById('username').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('sendOtpBtn').click();
    }
});

document.getElementById('otp').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('resetBtn').click();
    }
});

// Only allow numbers in OTP field
document.getElementById('otp').addEventListener('input', function(e) {
    this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
});
</script>

{% endblock %}
