{% extends "base.html" %}

{% block title %}Change Password - {{ business_name }}{% endblock %}

{% block content %}

<style>
/* ============================================
   EXACTLY CONSISTENT WITH ADMIN CHANGE PASSWORD
   ============================================ */

:root {
    --primary: #0C5B3F;
    --primary-light: #138A52;
    --primary-dark: #09452F;
    --accent: #138A52;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --info: #3b82f6;
    --radius-lg: 12px;
    --radius-md: 8px;
    --radius-sm: 6px;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.03);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}

/* Modal Animation */
@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

/* Modal Styles */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    animation: fadeIn 0.3s ease;
}

.modal-container {
    background: white;
    border-radius: 16px;
    max-width: 450px;
    width: 90%;
    padding: 28px;
    text-align: center;
    animation: slideIn 0.3s ease;
}

.modal-success-icon {
    width: 80px;
    height: 80px;
    background: #10b981;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.modal-success-icon i {
    font-size: 48px;
    color: white;
}

.modal-error-icon {
    width: 80px;
    height: 80px;
    background: #ef4444;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.modal-error-icon i {
    font-size: 48px;
    color: white;
}

.modal-title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--gray-800);
}

.modal-message {
    color: var(--gray-600);
    margin-bottom: 24px;
    line-height: 1.5;
}

.modal-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
}

.modal-button {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
}

.modal-button-primary {
    background: var(--primary);
    color: white;
}

.modal-button-primary:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
}

/* Loading Spinner */
.loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.container {
    max-width: 500px;
    margin: 0 auto;
}

/* Header - Consistent with Admin */
.page-header {
    margin-bottom: 28px;
}

.page-header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--gray-800);
    margin-bottom: 4px;
}

.page-header p {
    font-size: 0.8rem;
    color: var(--gray-500);
}

/* Form Card - Exactly matching admin */
.form-card {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    overflow: hidden;
}

.form-section {
    padding: 28px;
}

/* Form Elements - Exactly matching admin */
.form-group {
    margin-bottom: 20px;
}

.form-label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--gray-600);
    margin-bottom: 6px;
    display: block;
}

.form-label .required {
    color: var(--danger);
}

.input-wrapper {
    position: relative;
}

.input-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray-400);
    font-size: 1rem;
    z-index: 1;
}

.form-control {
    width: 100%;
    padding: 10px 12px 10px 38px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-md);
    font-size: 0.85rem;
    transition: all 0.2s ease;
    font-family: inherit;
}

.form-control:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(19,138,82,0.1);
}

.password-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gray-400);
    z-index: 10;
    font-size: 1rem;
}

.password-toggle:hover {
    color: var(--accent);
}

/* Form Helpers - Exactly matching admin */
.form-helper {
    font-size: 0.7rem;
    color: var(--gray-400);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.match-message {
    font-size: 0.7rem;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.match-success {
    color: var(--success);
}

.match-error {
    color: var(--danger);
}

.password-strength {
    font-size: 0.7rem;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.strength-weak {
    color: var(--danger);
}

.strength-medium {
    color: var(--warning);
}

.strength-strong {
    color: var(--success);
}

/* Buttons - Exactly matching admin */
.btn-ui {
    border: none;
    border-radius: var(--radius-md);
    font-weight: 500;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    cursor: pointer;
    font-size: 0.85rem;
    padding: 12px 20px;
}

.btn-primary-ui {
    background: var(--primary);
    color: white;
    width: 100%;
}

.btn-primary-ui:hover:not(:disabled) {
    background: var(--accent);
    transform: translateY(-1px);
}

.btn-primary-ui:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}

/* Back Link */
.back-link {
    margin-top: 20px;
    text-align: center;
}

.back-link a {
    font-size: 0.8rem;
    color: var(--gray-500);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s ease;
}

.back-link a:hover {
    color: var(--primary);
    gap: 10px;
}

/* Responsive */
@media (max-width: 768px) {
    .form-section {
        padding: 20px;
    }
    
    .page-header h1 {
        font-size: 1.3rem;
    }
    
    .btn-ui {
        padding: 10px 16px;
    }
}
</style>

<div class="container py-3">

    <!-- Header - Consistent with Admin -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h1 class="fw-bold mb-1" style="font-size: 1.5rem;">
                <i class="bi bi-shield-lock"></i> Change Password
            </h1>
            <p class="text-muted mb-0" style="font-size: 0.8rem;">Update your account password</p>
        </div>
    </div>

    <!-- Form Card -->
    <div class="form-card">
        <form id="passwordForm">
            <div class="form-section">

                <!-- Current Password -->
                <div class="form-group">
                    <label class="form-label">Current Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" 
                               name="old_password" 
                               id="old_password"
                               class="form-control" 
                               placeholder="Enter current password"
                               required>
                        <button type="button" class="password-toggle" onclick="togglePassword('old_password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- New Password -->
                <div class="form-group">
                    <label class="form-label">New Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="bi bi-key input-icon"></i>
                        <input type="password" 
                               name="new_password" 
                               id="new_password"
                               class="form-control" 
                               placeholder="Enter new password"
                               required>
                        <button type="button" class="password-toggle" onclick="togglePassword('new_password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="form-helper">
                        <i class="bi bi-info-circle"></i> Password must be at least 6 characters
                    </div>
                    <div id="passwordStrength" class="password-strength"></div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label class="form-label">Confirm New Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="bi bi-check-circle input-icon"></i>
                        <input type="password" 
                               name="confirm_password" 
                               id="confirm_password"
                               class="form-control" 
                               placeholder="Confirm new password"
                               required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirm_password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div id="matchMessage" class="match-message"></div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-ui btn-primary-ui" id="submitBtn">
                    <i class="bi bi-check-lg"></i> Update Password
                </button>

                <!-- Back to Dashboard Link -->
                <div class="back-link">
                    <a href="{{ url_for('customer.dashboard') }}" id="cancelBtn">
                        <i class="bi bi-arrow-left"></i> Back to Dashboard
                    </a>
                </div>

            </div>
        </form>
    </div>

</div>

<script>
// Close modal function
function closeModal(modalId = null) {
    if (modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.remove();
    } else {
        const modals = document.querySelectorAll('.modal-overlay');
        modals.forEach(modal => modal.remove());
    }
}

// Show success/error modal
function showModal(title, message, type = 'success', redirectUrl = null) {
    closeModal();
    const modalHtml = `
        <div class="modal-overlay" id="resultModal">
            <div class="modal-container">
                <div class="modal-${type === 'success' ? 'success' : 'error'}-icon">
                    <i class="bi bi-${type === 'success' ? 'check-lg' : 'x-lg'}"></i>
                </div>
                <div class="modal-title">${title}</div>
                <div class="modal-message">${message}</div>
                <div class="modal-buttons">
                    <button class="modal-button modal-button-primary" id="modalCloseBtn">OK</button>
                </div>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    
    document.getElementById('modalCloseBtn').onclick = function() {
        closeModal('resultModal');
        if (redirectUrl) {
            window.location.href = redirectUrl;
        }
    };
}

// Password visibility toggle
function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
}

// Password strength checker
function checkPasswordStrength(password) {
    const strengthEl = document.getElementById('passwordStrength');
    if (!strengthEl) return;
    
    const length = password.length;
    
    if (length === 0) {
        strengthEl.innerHTML = '';
        strengthEl.className = 'password-strength';
    } else if (length < 6) {
        strengthEl.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Too weak - minimum 6 characters';
        strengthEl.className = 'password-strength strength-weak';
    } else if (length < 8) {
        strengthEl.innerHTML = '<i class="bi bi-shield-check"></i> Acceptable password';
        strengthEl.className = 'password-strength strength-medium';
    } else {
        strengthEl.innerHTML = '<i class="bi bi-shield-fill-check"></i> Strong password';
        strengthEl.className = 'password-strength strength-strong';
    }
}

// Password match checker
function checkPasswordMatch() {
    const newPass = document.getElementById('new_password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    const matchMessage = document.getElementById('matchMessage');
    
    if (confirmPass.length === 0) {
        matchMessage.innerHTML = '';
        matchMessage.className = 'match-message';
    } else if (newPass === confirmPass) {
        matchMessage.innerHTML = '<i class="bi bi-check-circle-fill"></i> Passwords match';
        matchMessage.className = 'match-message match-success';
    } else {
        matchMessage.innerHTML = '<i class="bi bi-x-circle-fill"></i> Passwords do not match';
        matchMessage.className = 'match-message match-error';
    }
}

// AJAX Form Submission
let isSubmitting = false;

document.getElementById('passwordForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    if (isSubmitting) return false;
    
    const newPass = document.getElementById('new_password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    const oldPassword = document.getElementById('old_password').value;
    
    // Validation
    if (!oldPassword) {
        showModal('Validation Error', 'Please enter your current password', 'error');
        return false;
    }
    
    if (newPass !== confirmPass) {
        showModal('Validation Error', 'New password and confirm password do not match!', 'error');
        return false;
    }
    
    if (newPass.length < 6) {
        showModal('Validation Error', 'Password must be at least 6 characters long!', 'error');
        return false;
    }
    
    // Collect form data
    const formData = new FormData();
    formData.append('old_password', oldPassword);
    formData.append('new_password', newPass);
    formData.append('confirm_password', confirmPass);
    
    // Mark as submitting
    isSubmitting = true;
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="loading-spinner"></span> Updating Password...';
    
    try {
        const response = await fetch('/auth/change-password', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        });
        
        const data = await response.json();
        
        if (data.success) {
            showModal('Success!', data.message || 'Password changed successfully!', 'success', data.redirect || '{{ url_for("customer.dashboard") }}');
        } else {
            showModal('Error', data.error || 'Failed to change password', 'error');
            isSubmitting = false;
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="bi bi-check-lg"></i> Update Password';
        }
    } catch (error) {
        console.error('Error:', error);
        showModal('Error', 'Network error. Please try again.', 'error');
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-check-lg"></i> Update Password';
    }
});

// Real-time validation
document.getElementById('new_password').addEventListener('input', function() {
    checkPasswordStrength(this.value);
    checkPasswordMatch();
});

document.getElementById('confirm_password').addEventListener('input', function() {
    checkPasswordMatch();
});
</script>

{% endblock %}
