{% extends "base_admin.html" %}

{% block title %}Edit Customer - {{ business_name }}{% endblock %}

{% block content %}

<style>
:root {
    --primary: #0C5B3F;
    --primary-light: #138A52;
    --primary-dark: #09452F;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --info: #3b82f6;
    --radius-lg: 16px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}

/* Modal Animation */
@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

/* Modal Styles */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    animation: fadeIn 0.3s ease;
}

.modal-container {
    background: white;
    border-radius: 16px;
    max-width: 450px;
    width: 90%;
    padding: 28px;
    text-align: center;
    animation: slideIn 0.3s ease;
}

.modal-success-icon {
    width: 80px;
    height: 80px;
    background: #10b981;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.modal-success-icon i {
    font-size: 48px;
    color: white;
}

.modal-error-icon {
    width: 80px;
    height: 80px;
    background: #ef4444;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.modal-error-icon i {
    font-size: 48px;
    color: white;
}

.modal-danger-icon {
    width: 80px;
    height: 80px;
    background: #ef4444;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.modal-danger-icon i {
    font-size: 48px;
    color: white;
}

.modal-info-icon {
    width: 80px;
    height: 80px;
    background: var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.modal-info-icon i {
    font-size: 48px;
    color: white;
}

.modal-title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--gray-800);
}

.modal-message {
    color: var(--gray-600);
    margin-bottom: 24px;
    line-height: 1.5;
}

.modal-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
}

.modal-button {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
}

.modal-button-primary {
    background: var(--primary);
    color: white;
}

.modal-button-primary:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
}

.modal-button-danger {
    background: #ef4444;
    color: white;
}

.modal-button-danger:hover {
    background: #dc2626;
    transform: translateY(-1px);
}

.modal-button-secondary {
    background: var(--gray-200);
    color: var(--gray-700);
}

.modal-button-secondary:hover {
    background: var(--gray-300);
}

/* Loading Spinner */
.loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Status Toggle */
.form-switch .form-check-input {
    width: 2.5rem;
    height: 1.25rem;
    cursor: pointer;
}

.form-switch .form-check-input:checked {
    background-color: var(--success);
    border-color: var(--success);
}

.status-badge {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
}

.status-active {
    background: #e8f5e9;
    color: #2e7d32;
}

.status-inactive {
    background: var(--gray-100);
    color: var(--gray-600);
}
</style>

<div class="container-fluid py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-person-badge"></i> Edit Customer
            </h2>
            <small class="text-muted">Update customer details safely</small>
        </div>
        <a href="{{ url_for('admin.customers_list') }}" class="btn btn-light" id="cancelBtn">
            <i class="bi bi-arrow-left"></i> Back to Customers
        </a>
    </div>

    <!-- FORM CARD -->
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <form id="editCustomerForm">
                        <div class="row g-3">

                            <!-- NAME -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Name *</label>
                                <input type="text"
                                       name="name"
                                       id="customerName"
                                       class="form-control"
                                       value="{{ customer.name }}"
                                       required
                                       placeholder="Enter full name">
                            </div>

                            <!-- USERNAME -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Username *</label>
                                <input type="text"
                                       name="username"
                                       id="customerUsername"
                                       class="form-control"
                                       value="{{ customer.username }}"
                                       required
                                       placeholder="Enter username">
                            </div>

                            <!-- EMAIL -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email"
                                       name="email"
                                       id="customerEmail"
                                       class="form-control"
                                       value="{{ customer.email or '' }}"
                                       placeholder="customer@example.com">
                            </div>

                            <!-- PHONE -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Phone</label>
                                <input type="text"
                                       name="phone"
                                       id="customerPhone"
                                       class="form-control"
                                       value="{{ customer.phone or '' }}"
                                       placeholder="Phone number">
                            </div>

                            <!-- STATUS - Active Toggle -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Status</label>
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input"
                                           type="checkbox"
                                           name="is_active"
                                           id="is_active"
                                           {% if customer.is_active %}checked{% endif %}>
                                    <label class="form-check-label fw-bold" for="is_active">
                                        <span id="statusLabel" class="status-badge {% if customer.is_active %}status-active{% else %}status-inactive{% endif %}">
                                            {% if customer.is_active %}Active{% else %}Inactive{% endif %}
                                        </span>
                                    </label>
                                </div>
                                <small class="text-muted">Inactive customers cannot log in</small>
                            </div>

                            <!-- ADDRESS -->
                            <div class="col-md-12">
                                <label class="form-label fw-bold">Address</label>
                                <textarea name="address"
                                          id="customerAddress"
                                          class="form-control"
                                          rows="3"
                                          placeholder="Customer address">{{ customer.address or '' }}</textarea>
                            </div>

                        </div>

                        <!-- UPDATE BUTTON -->
                        <button type="submit" class="btn btn-primary w-100 mt-4" id="submitBtn">
                            <i class="bi bi-save"></i> Update Customer
                        </button>
                    </form>

                    <!-- DELETE BUTTON -->
                    <button type="button" class="btn btn-danger w-100 mt-2" id="deleteBtn">
                        <i class="bi bi-trash"></i> Delete Customer
                    </button>

                </div>
            </div>
        </div>
    </div>

</div>

<script>
// Customer data from backend
const customerId = {{ customer.id }};
const customerName = "{{ customer.name }}";

// Close modal function
function closeModal(modalId = null) {
    if (modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.remove();
    } else {
        const modals = document.querySelectorAll('.modal-overlay');
        modals.forEach(modal => modal.remove());
    }
}

// Show success/error modal
function showModal(title, message, type = 'success', redirectUrl = null) {
    closeModal();
    const modalHtml = `
        <div class="modal-overlay" id="resultModal">
            <div class="modal-container">
                <div class="modal-${type === 'success' ? 'success' : 'error'}-icon">
                    <i class="bi bi-${type === 'success' ? 'check-lg' : 'x-lg'}"></i>
                </div>
                <div class="modal-title">${title}</div>
                <div class="modal-message">${message}</div>
                <div class="modal-buttons">
                    <button class="modal-button modal-button-primary" id="modalCloseBtn">OK</button>
                </div>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    
    document.getElementById('modalCloseBtn').onclick = function() {
        closeModal('resultModal');
        if (redirectUrl) {
            window.location.href = redirectUrl;
        }
    };
}

// Show delete confirmation modal
function showDeleteConfirmation() {
    closeModal();
    const modalHtml = `
        <div class="modal-overlay" id="deleteModal">
            <div class="modal-container">
                <div class="modal-danger-icon">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <div class="modal-title">Delete Customer?</div>
                <div class="modal-message">
                    Are you sure you want to delete <strong>${escapeHtml(customerName)}</strong>?<br><br>
                    <span style="color: #ef4444;">⚠️ This will also delete all associated sales and advance transactions!</span><br>
                    <strong>This action cannot be undone!</strong>
                </div>
                <div class="modal-buttons">
                    <button class="modal-button modal-button-danger" id="confirmDeleteBtn">Yes, Delete</button>
                    <button class="modal-button modal-button-secondary" id="cancelDeleteBtn">Cancel</button>
                </div>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    
    document.getElementById('confirmDeleteBtn').onclick = function() {
        closeModal('deleteModal');
        performDelete();
    };
    
    document.getElementById('cancelDeleteBtn').onclick = function() {
        closeModal('deleteModal');
    };
}

// Perform delete via AJAX
async function performDelete() {
    const loadingHtml = `
        <div class="modal-overlay" id="loadingModal">
            <div class="modal-container">
                <div class="modal-info-icon">
                    <i class="bi bi-hourglass-split"></i>
                </div>
                <div class="modal-title">Deleting Customer...</div>
                <div class="modal-message">Please wait while we delete the customer and all associated data.</div>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', loadingHtml);
    
    try {
        const response = await fetch('/admin/customers/' + customerId + '/delete', {
            method: 'POST',
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'Content-Type': 'application/json'
            }
        });
        
        const data = await response.json();
        closeModal('loadingModal');
        
        if (data.success) {
            showModal('Deleted!', data.message || `Customer "${customerName}" deleted successfully!`, 'success', '/admin/customers');
        } else {
            showModal('Error', data.error || 'Failed to delete customer', 'error');
        }
    } catch (error) {
        closeModal('loadingModal');
        console.error('Error:', error);
        showModal('Error', 'Network error. Please try again.', 'error');
    }
}

// Escape HTML to prevent XSS
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Update status label when toggle changes
document.getElementById('is_active').addEventListener('change', function() {
    const statusLabel = document.getElementById('statusLabel');
    if (this.checked) {
        statusLabel.className = 'status-badge status-active';
        statusLabel.textContent = 'Active';
    } else {
        statusLabel.className = 'status-badge status-inactive';
        statusLabel.textContent = 'Inactive';
    }
});

// Delete button click handler
document.getElementById('deleteBtn').addEventListener('click', function(e) {
    e.preventDefault();
    showDeleteConfirmation();
});

// AJAX Form Submission
let isSubmitting = false;

document.getElementById('editCustomerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    if (isSubmitting) return false;
    
    // Validate required fields
    const name = document.getElementById('customerName').value.trim();
    const username = document.getElementById('customerUsername').value.trim();
    
    if (!name) {
        showModal('Validation Error', 'Please enter customer name', 'error');
        return false;
    }
    
    if (!username) {
        showModal('Validation Error', 'Username is required', 'error');
        return false;
    }
    
    // Collect form data
    const formData = new FormData();
    formData.append('name', name);
    formData.append('username', username);
    formData.append('email', document.getElementById('customerEmail').value.trim());
    formData.append('phone', document.getElementById('customerPhone').value.trim());
    formData.append('address', document.getElementById('customerAddress').value.trim());
    formData.append('is_active', document.getElementById('is_active').checked ? 'on' : 'off');
    
    // Mark as submitting
    isSubmitting = true;
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="loading-spinner"></span> Updating Customer...';
    
    try {
        const response = await fetch('{{ url_for("admin.edit_customer", customer_id=customer.id) }}', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        });
        
        const data = await response.json();
        
        if (data.success) {
            showModal('Success!', data.message || 'Customer updated successfully!', 'success', data.redirect || '{{ url_for("admin.customers_list") }}');
        } else {
            showModal('Error', data.error || 'Failed to update customer', 'error');
            isSubmitting = false;
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="bi bi-save"></i> Update Customer';
        }
    } catch (error) {
        console.error('Error:', error);
        showModal('Error', 'Network error. Please try again.', 'error');
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-save"></i> Update Customer';
    }
});
</script>

{% endblock %}
