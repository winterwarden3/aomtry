{% extends "base_admin.html" %}

{% block title %}Page Not Found - {{ business_name }}{% endblock %}

{% block content %}

<div class="container-fluid py-5">
    <div class="text-center" style="min-height: 60vh; display: flex; flex-direction: column; justify-content: center;">
        <i class="bi bi-exclamation-triangle" style="font-size: 80px; color: #f59e0b;"></i>
        <h1 class="display-1 fw-bold mt-3" style="color: var(--primary);">404</h1>
        <h3 class="mb-3">Page Not Found</h3>
        <p class="text-muted mb-4">The page you are looking for does not exist.</p>
        <div>
            <a href="{{ url_for('admin.dashboard') }}" class="btn-ui btn-primary-ui">
                <i class="bi bi-speedometer2"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>

{% endblock %}
